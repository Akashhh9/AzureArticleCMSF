name: Build and deploy Python app to Azure Web App - articlecmsakashwebapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: articlecmsakashwebapp
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B6FA89B159D24C21BA494256009B0ED2 }}
